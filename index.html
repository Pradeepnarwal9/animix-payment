<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animix - Pet Marketplace</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      font-size: 28px;
      font-weight: bold;
      animation: fadeIn 1s ease-in;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 250px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transform: translateY(50px);
      opacity: 0;
      animation: slideUp 1s forwards;
    }

    .card:nth-child(2) {
      animation-delay: 0.3s;
    }

    .card h2 {
      margin: 10px 0;
    }

    .price {
      font-size: 20px;
      color: green;
      margin: 10px 0;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
      transform: scale(1.05);
    }

    #checkout {
      display: none;
      margin-top: 30px;
      animation: fadeIn 1s;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    footer {
      margin-top: 50px;
      font-size: 14px;
      opacity: 0.8;
    }

    @keyframes slideUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

<header>🐾 Animix - Pet Marketplace</header>

<div class="container">

  <div class="card">
    <h2>Dog Food</h2>
    <p>Healthy premium food for dogs</p>
    <div class="price">₹500</div>
    <button onclick="buyNow('Dog Food', 500)">Buy Now</button>
  </div>

  <div class="card">
    <h2>Bird Cage</h2>
    <p>Spacious and durable cage</p>
    <div class="price">₹1200</div>
    <button onclick="buyNow('Bird Cage', 1200)">Buy Now</button>
  </div>

</div>

<div id="checkout">
  <h2>Checkout</h2>
  <input type="text" id="name" placeholder="Your Name"><br>
  <input type="text" id="phone" placeholder="Phone Number"><br><br>
  <button onclick="payNow()">Proceed to Pay</button>
</div>

<footer>
  Secure payments powered by Razorpay
</footer>

<script>

let selectedProduct = "";
let selectedAmount = 0;

function buyNow(product, amount) {
  selectedProduct = product;
  selectedAmount = amount;
  document.getElementById("checkout").style.display = "block";
}

function payNow() {

  var options = {
    "key": "rzp_test_S3ispZWNed4B9K", // YOUR TEST KEY
    "amount": selectedAmount * 100,
    "currency": "INR",
    "name": "Animix",
    "description": selectedProduct,
    "handler": function (response){
        alert("✅ Payment Successful (Demo)");
    },
    "prefill": {
        "name": document.getElementById("name").value,
        "contact": document.getElementById("phone").value
    },
    "theme": {
        "color": "#667eea"
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}

</script>

</body>
</html>
